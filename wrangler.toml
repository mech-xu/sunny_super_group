name = "sunnynow-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# Cloudflare R2 存储配置
[[r2_buckets]]
bucket_name = "sunnynow-assets"
binding = "ASSETS_BUCKET"

# 环境变量
[vars]
SUPABASE_URL = ""
SUPABASE_ANON_KEY = ""
SUPABASE_SERVICE_ROLE_KEY = ""

# 开发环境配置
[env.dev]
vars = { NODE_ENV = "development" }

# 生产环境配置  
[env.production]
vars = { NODE_ENV = "production" }